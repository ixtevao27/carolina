<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário Carolina</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #8e2de2);
  font-family: Arial, sans-serif;
  text-align: center;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 3em;
  margin-bottom: 20px;
}

p {
  font-size: 1.5em;
  margin: 10px 0;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 1.2em;
  border: none;
  border-radius: 12px;
  background: #a855f7;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #9333ea;
  transform: scale(1.05);
}

#resposta {
  margin-top: 20px;
  font-size: 1.5em;
}
</style>
</head>
<body>

<h1>🎉 Feliz Aniversário, Carolina! 🎉</h1>

<p>Hoje é o teu dia especial ✨</p>
<p>E eu só queria dizer que...</p>
<p><strong>tu és MUITO linda 💜</strong></p>

<p>Mas tenho uma pergunta importante...</p>

<button onclick="resposta()">Queres namorar comigo?</button>

<p id="resposta"></p>

<script>
function resposta() {
  document.getElementById("resposta").innerHTML = "Espero mesmo que sim 😍💜";
}
</script>

</body>
</html>
